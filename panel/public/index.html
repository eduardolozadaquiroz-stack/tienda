<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">

     <!-- Favicon -->
     <link rel="shortcut icon" href="<%= BASE_URL %>assets/favicon/favicon.ico" type="image/x-icon"/>
    
     <!-- Map CSS -->
     <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v0.53.0/mapbox-gl.css" />
     
     <!-- Libs CSS -->
     <link rel="stylesheet" href="<%= BASE_URL %>assets/css/libs.bundle.css" /> 
     
     <!-- Theme CSS -->
     <link rel="stylesheet" href="<%= BASE_URL %>assets/css/theme.bundle.css" id="stylesheetLight" /> 
     <link rel="stylesheet" href="<%= BASE_URL %>assets/css/theme-dark.bundle.css" id="stylesheetDark" />
     
     <style>
        @font-face {
          font-family: 'cerebrisans';
          src: url('<%= BASE_URL %>assets/fonts/cerebrisans/cerebrisans-regular.woff');
        }
        * { font-family: 'cerebrisans' !important; }

        /* ── Fondo principal ── */
        html, body {
          background: linear-gradient(145deg, #eef2f9 0%, #e8edf6 50%, #edf1f8 100%) !important;
          min-height: 100vh;
        }

        /* ── Tarjetas con sombra más suave y profunda ── */
        .card {
          background: #ffffff !important;
          border: none !important;
          border-radius: 12px !important;
          box-shadow: 0 1px 3px rgba(16,24,40,.06), 0 4px 16px rgba(16,24,40,.04) !important;
          transition: box-shadow .18s ease;
        }
        .card:hover {
          box-shadow: 0 2px 8px rgba(16,24,40,.09), 0 8px 24px rgba(16,24,40,.07) !important;
        }

        /* ── Contenido principal (área derecha del sidebar) ── */
        .main-content {
          background: transparent !important;
        }

        /* ── Navbar superior ── */
        .navbar:not(#sidebar) {
          background: rgba(255,255,255,0.92) !important;
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          border-bottom: 1px solid rgba(0,0,0,.06) !important;
          box-shadow: 0 1px 8px rgba(16,24,40,.05) !important;
        }

        /* ── Sidebar ── */
        #sidebar {
          background: linear-gradient(180deg, #ffffff 0%, #f7f9fc 100%) !important;
          border-right: 1px solid rgba(0,0,0,.07) !important;
          box-shadow: 2px 0 12px rgba(16,24,40,.05) !important;
        }

        /* ── Modales y dropdowns ── */
        .modal-content, .dropdown-menu {
          background: #ffffff !important;
          border-radius: 12px !important;
          border: 1px solid rgba(0,0,0,.08) !important;
          box-shadow: 0 8px 32px rgba(16,24,40,.12) !important;
        }
        .modal-backdrop {
    background-color: #12263f3b !important;
        }
        .pagination{
          margin-bottom: 0px !important;
        }
     </style>

    <title><%= htmlWebpackPlugin.options.title %></title>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->

    <!-- Map JS -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v0.53.0/mapbox-gl.js'></script>
    
    <!-- Vendor JS -->
    <script src="<%= BASE_URL %>assets/js/vendor.bundle.js"></script>
    
    <!-- Theme JS -->
    <script src="<%= BASE_URL %>assets/js/theme.bundle.js"></script>

  </body>
</html>
